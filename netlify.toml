[build]
  publish = "news-site"
  command = ""

# Admin panel — serve directly
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Airline tracker — SPA fallback (must come before the catch-all)
[[redirects]]
  from = "/tracker/*"
  to = "/tracker/index.html"
  status = 200

# All other routes → news site index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
